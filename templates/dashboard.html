<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <h1>Welcome, {{ username }}</h1>
    <form method="post" action="{{ url_for('logout') }}">
      <input id="logout_csrf_token" name="csrf_token" type="hidden" value="{{ csrf_token }}">
      <button type="submit" class="secondary">Log Out</button>
    </form>
  </header>

  <main class="dashboard-wrap">
    <section class="card">
      <h2>Empty Dashboard</h2>
      <p class="subtext">Signed in as {{ email }}</p>
      <p class="subtext">Your dashboard widgets and data will appear here.</p>
      <a class="link-button" href="{{ url_for('data_pulls') }}">View Data Pulls</a>
    </section>
  </main>
</body>
</html>
