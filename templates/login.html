<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="center-wrap">
    <section class="card">
      <h1>Dashboard Login</h1>
      <p class="subtext">Sign in to continue.</p>

      {% if error %}
      <p class="error" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="{{ url_for('login') }}" class="form">
        <input id="csrf_token" name="csrf_token" type="hidden" value="{{ csrf_token }}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" value="{{ form_data.username }}" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="{{ form_data.email }}" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Log In</button>
      </form>
    </section>
  </main>
</body>
</html>
